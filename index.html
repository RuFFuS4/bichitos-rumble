<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bichitos Rumble</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a2e; }
    canvas { display: block; }
    #hud {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none;
      font-family: 'Segoe UI', Arial, sans-serif;
      color: #fff;
    }
    #hud-top {
      display: flex;
      justify-content: space-between;
      padding: 12px 20px;
      font-size: 18px;
      text-shadow: 0 2px 4px rgba(0,0,0,0.7);
    }
    #overlay {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      font-size: 36px;
      font-weight: bold;
      text-shadow: 0 3px 8px rgba(0,0,0,0.8);
      pointer-events: auto;
    }
    #overlay .sub {
      font-size: 18px;
      margin-top: 8px;
      opacity: 0.8;
    }
    /* Ability cooldown bars */
    #ability-bar-container {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 16px;
      pointer-events: none;
    }
    .ability-slot {
      width: 90px;
      text-align: center;
      text-shadow: 0 1px 3px rgba(0,0,0,0.8);
    }
    .ability-key {
      font-size: 14px;
      font-weight: bold;
      letter-spacing: 1px;
      margin-bottom: 3px;
    }
    .ability-name {
      font-size: 10px;
      opacity: 0.7;
      margin-bottom: 4px;
    }
    .ability-fill-bg {
      width: 100%;
      height: 6px;
      background: rgba(255,255,255,0.12);
      border-radius: 3px;
      overflow: hidden;
    }
    .ability-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.1s linear;
      background: #4ade80;
    }
    .ability-slot.active .ability-fill {
      background: #ff8800;
      box-shadow: 0 0 6px #ff8800;
    }
    .ability-slot.active .ability-key {
      color: #ff8800;
    }
    .ability-slot.on-cooldown .ability-fill {
      background: #666;
    }
    .ability-slot.on-cooldown .ability-key {
      opacity: 0.5;
    }
    /* Lives panel */
    #hud-lives {
      display: flex;
      flex-direction: column;
      gap: 3px;
      align-items: center;
    }
    .lives-row {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 14px;
      transition: opacity 0.3s;
    }
    .lives-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
      border: 1px solid rgba(255,255,255,0.3);
    }
    .lives-hearts {
      color: #e74c3c;
      font-size: 13px;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div id="hud">
    <div id="hud-top">
      <span id="hud-alive">Alive: 4</span>
      <div id="hud-lives"></div>
      <span id="hud-timer">2:00</span>
    </div>
    <div id="overlay" style="display:none;"></div>
    <div id="ability-bar-container"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
  <!-- Vibe Coding Game Jam 2026 widget (required for submission) -->
  <script async src="https://jam.pieter.com/2026/widget.js"></script>
</body>
</html>
