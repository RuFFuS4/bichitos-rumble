<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bichitos Rumble</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a18; }
    canvas { display: block; }
    #hud {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none;
      font-family: 'Segoe UI', Arial, sans-serif;
      color: #fff;
    }
    #hud-top {
      display: flex;
      justify-content: space-between;
      padding: 12px 20px;
      font-size: 18px;
      text-shadow: 0 2px 4px rgba(0,0,0,0.7);
    }
    #overlay {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      font-size: 36px;
      font-weight: bold;
      text-shadow: 0 3px 8px rgba(0,0,0,0.8);
      pointer-events: auto;
    }
    #overlay .sub {
      font-size: 18px;
      margin-top: 8px;
      opacity: 0.8;
    }
    /* Ability cooldown bars */
    #ability-bar-container {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 16px;
      pointer-events: none;
    }
    .ability-slot {
      width: 90px;
      text-align: center;
      text-shadow: 0 1px 3px rgba(0,0,0,0.8);
    }
    .ability-key {
      font-size: 14px;
      font-weight: bold;
      letter-spacing: 1px;
      margin-bottom: 3px;
    }
    .ability-name {
      font-size: 10px;
      opacity: 0.7;
      margin-bottom: 4px;
    }
    .ability-fill-bg {
      width: 100%;
      height: 6px;
      background: rgba(255,255,255,0.12);
      border-radius: 3px;
      overflow: hidden;
    }
    .ability-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.1s linear;
      background: #4ade80;
    }
    .ability-slot.active .ability-fill {
      background: #ff8800;
      box-shadow: 0 0 6px #ff8800;
    }
    .ability-slot.active .ability-key {
      color: #ff8800;
    }
    .ability-slot.on-cooldown .ability-fill {
      background: #666;
    }
    .ability-slot.on-cooldown .ability-key {
      opacity: 0.5;
    }
    /* Lives panel */
    #hud-lives {
      display: flex;
      flex-direction: column;
      gap: 3px;
      align-items: center;
    }
    .lives-row {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 14px;
      transition: opacity 0.3s;
    }
    .lives-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
      border: 1px solid rgba(255,255,255,0.3);
    }
    .lives-hearts {
      color: #e74c3c;
      font-size: 13px;
      letter-spacing: 1px;
    }

    /* ---------- Full-screen overlays (title / select / end) ---------- */
    .full-overlay {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, rgba(10,10,24,0.75) 0%, rgba(10,10,24,0.92) 100%);
      color: #fff;
      pointer-events: auto;
      backdrop-filter: blur(3px);
      -webkit-backdrop-filter: blur(3px);
    }
    .full-overlay.hidden { display: none; }

    .prompt {
      font-size: 18px;
      opacity: 0.85;
      animation: pulse 1.4s ease-in-out infinite;
      margin-top: 20px;
    }
    .prompt kbd {
      display: inline-block;
      background: rgba(255,255,255,0.15);
      padding: 3px 10px;
      border-radius: 4px;
      font-family: monospace;
      font-size: 15px;
      border: 1px solid rgba(255,255,255,0.35);
      margin: 0 2px;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.9; }
      50% { opacity: 0.4; }
    }
    .controls-hint {
      position: absolute;
      bottom: 24px;
      font-size: 12px;
      opacity: 0.45;
      letter-spacing: 0.5px;
    }

    /* ---------- Title Screen ---------- */
    #title-screen .game-title {
      font-size: clamp(48px, 8vw, 96px);
      font-weight: 900;
      letter-spacing: 4px;
      text-align: center;
      line-height: 0.92;
      text-shadow:
        0 4px 28px rgba(0,0,0,0.9),
        0 0 50px rgba(231, 76, 60, 0.35);
      margin-bottom: 14px;
    }
    #title-screen .game-title .rumble {
      background: linear-gradient(180deg, #ffdc5c 0%, #e74c3c 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    #title-screen .tagline {
      font-size: 16px;
      opacity: 0.65;
      margin-bottom: 44px;
      letter-spacing: 1px;
    }

    /* ---------- Character Select ---------- */
    #character-select h2 {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: 3px;
      margin-bottom: 24px;
      opacity: 0.9;
    }
    #character-select .select-body {
      display: flex;
      gap: 40px;
      align-items: center;
      max-width: 1000px;
      padding: 0 30px;
    }
    /* Left: 3x3 grid of slots */
    #critter-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: 12px;
      width: 360px;
    }
    .critter-slot {
      width: 108px;
      height: 108px;
      background: rgba(255,255,255,0.04);
      border: 2px solid rgba(255,255,255,0.10);
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      cursor: pointer;
      transition: transform 0.18s, border-color 0.18s, background 0.18s;
      position: relative;
      overflow: hidden;
    }
    .critter-slot.selected {
      border-color: #fff;
      background: rgba(255,255,255,0.12);
      transform: scale(1.06);
      box-shadow: 0 6px 24px rgba(0,0,0,0.5);
    }
    .critter-slot .slot-dot {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      box-shadow: 0 3px 10px rgba(0,0,0,0.5), inset 0 -4px 8px rgba(0,0,0,0.3);
    }
    .critter-slot .slot-name {
      font-size: 12px;
      font-weight: bold;
      letter-spacing: 0.5px;
    }
    .critter-slot.locked {
      cursor: default;
      opacity: 0.45;
      background: rgba(255,255,255,0.02);
      border: 2px dashed rgba(255,255,255,0.12);
    }
    .critter-slot.locked .slot-name {
      font-size: 9px;
      font-weight: normal;
      opacity: 0.7;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .critter-slot.locked .slot-lock {
      font-size: 20px;
      opacity: 0.5;
    }

    /* Right: 3D preview + info */
    #preview-pane {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 360px;
    }
    #preview-canvas {
      width: 320px;
      height: 280px;
      display: block;
      cursor: grab;
      touch-action: none;
    }
    #preview-canvas:active {
      cursor: grabbing;
    }
    #critter-info {
      text-align: center;
      margin-top: 4px;
      width: 100%;
    }
    #critter-info-name {
      font-size: 26px;
      font-weight: 900;
      letter-spacing: 1px;
    }
    #critter-info-role {
      font-size: 11px;
      opacity: 0.65;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-top: 2px;
    }
    #critter-info-tagline {
      font-size: 13px;
      opacity: 0.7;
      margin-top: 10px;
      min-height: 18px;
    }
    #critter-info-stats {
      margin-top: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 80%;
      margin-left: auto;
      margin-right: auto;
    }
    .stat-row {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 10px;
      letter-spacing: 1px;
      opacity: 0.85;
    }
    .stat-label {
      width: 54px;
      text-align: right;
      text-transform: uppercase;
      opacity: 0.7;
    }
    .stat-bar-bg {
      flex: 1;
      height: 8px;
      background: rgba(255,255,255,0.1);
      border-radius: 4px;
      overflow: hidden;
    }
    .stat-bar {
      height: 100%;
      background: linear-gradient(90deg, #4ade80, #ffdc5c);
      border-radius: 4px;
      transition: width 0.35s ease-out;
    }

    /* ---------- End Screen ---------- */
    #end-screen .end-result {
      font-size: clamp(40px, 6vw, 72px);
      font-weight: 900;
      letter-spacing: 3px;
      text-align: center;
      margin-bottom: 12px;
      text-shadow: 0 4px 24px rgba(0,0,0,0.9);
    }
    #end-screen .end-result.win {
      color: #4ade80;
      text-shadow: 0 4px 28px rgba(74,222,128,0.55), 0 0 60px rgba(74,222,128,0.25);
    }
    #end-screen .end-result.lose {
      color: #e74c3c;
      text-shadow: 0 4px 28px rgba(231,76,60,0.55), 0 0 60px rgba(231,76,60,0.25);
    }
    #end-screen .end-result.draw {
      color: #ffdc5c;
    }
    #end-screen .end-subtitle {
      font-size: 16px;
      opacity: 0.7;
      margin-bottom: 24px;
    }
  </style>
</head>
<body>
  <div id="hud">
    <div id="hud-top">
      <span id="hud-alive">Alive: 4</span>
      <div id="hud-lives"></div>
      <span id="hud-timer">2:00</span>
    </div>
    <div id="overlay" style="display:none;"></div>
    <div id="ability-bar-container"></div>
  </div>

  <div id="title-screen" class="full-overlay hidden">
    <h1 class="game-title">BICHITOS<br><span class="rumble">RUMBLE</span></h1>
    <p class="tagline">HEADBUTT YOUR RIVALS INTO THE VOID</p>
    <div class="prompt">Press <kbd>SPACE</kbd> to start</div>
    <div class="controls-hint">WASD move · SPACE headbutt · J/K abilities · R restart</div>
  </div>

  <div id="character-select" class="full-overlay hidden">
    <h2>CHOOSE YOUR CRITTER</h2>
    <div class="select-body">
      <div id="critter-grid"></div>
      <div id="preview-pane">
        <canvas id="preview-canvas"></canvas>
        <div id="critter-info">
          <div id="critter-info-name"></div>
          <div id="critter-info-role"></div>
          <div id="critter-info-tagline"></div>
          <div id="critter-info-stats"></div>
        </div>
      </div>
    </div>
    <div class="prompt"><kbd>◄</kbd> <kbd>►</kbd> select · <kbd>SPACE</kbd> confirm · drag to rotate</div>
  </div>

  <div id="end-screen" class="full-overlay hidden">
    <div class="end-result" id="end-result">Result</div>
    <div class="end-subtitle" id="end-subtitle"></div>
    <div class="prompt"><kbd>R</kbd> restart · <kbd>T</kbd> title</div>
  </div>
  <script type="module" src="/src/main.ts"></script>
  <!-- Vibe Coding Game Jam 2026 widget (required for submission) -->
  <script async src="https://jam.pieter.com/2026/widget.js"></script>
</body>
</html>
